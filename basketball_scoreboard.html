<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Basketball">
<meta name="theme-color" content="#0a0a0a">
<title>Basketball Scoreboard</title>

<!-- PWA Manifest inline via JS (created dynamically) -->
<link id="manifest-link" rel="manifest" href="#">

<!-- Apple Touch Icon (inline SVG → data URI set via JS) -->
<link id="apple-icon" rel="apple-touch-icon" href="#">

<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap');

  :root {
    --orange: #FF8C00;
    --red: #FF2020;
    --white: #F0F0F0;
    --blue: #3399FF;
    --green: #00FF88;
    --yellow: #FFD700;
    --dim-orange: #3A2000;
    --dim-red: #2A0000;
    --dim-white: #1A1A1A;
    --glow-orange: 0 0 8px #FF8C00, 0 0 20px #FF6000aa;
    --glow-red: 0 0 8px #FF2020, 0 0 20px #FF000088;
    --glow-white: 0 0 8px #ffffff, 0 0 20px #ffffffaa;
    --glow-blue: 0 0 6px #3399FF, 0 0 14px #0066ffaa;
    --glow-green: 0 0 8px #00FF88, 0 0 16px #00cc6688;
    --glow-yellow: 0 0 8px #FFD700, 0 0 16px #ffaa0088;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #060606;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    color: var(--white);
    padding: 12px;
  }

  .board {
    background: linear-gradient(145deg, #1a1a1a, #0d0d0d);
    border: 2px solid #2a2a2a;
    border-radius: 14px;
    padding: 18px 20px 16px;
    width: min(920px, 100%);
    box-shadow: 0 0 60px #00000099, inset 0 1px 0 #333;
    position: relative;
    overflow: hidden;
  }

  .board::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #444, transparent);
  }

  .board::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
    pointer-events: none;
    border-radius: 12px;
  }

  /* ===== GAME CLOCK ROW ===== */
  .top-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 12px;
  }

  .game-clock-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(48px, 8vw, 84px);
    color: var(--white);
    text-shadow: var(--glow-white);
    letter-spacing: 4px;
    background: var(--dim-white);
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid #2a2a2a;
    min-width: 260px;
    text-align: center;
    transition: color 0.2s;
  }

  .game-clock-display.warning {
    color: #FF4400;
    text-shadow: var(--glow-red);
    animation: blink 0.5s ease-in-out infinite alternate;
  }

  @keyframes blink {
    from { opacity: 1; }
    to { opacity: 0.6; }
  }

  @keyframes buzz-flash {
    0%,100% { background: var(--dim-white); }
    25%,75% { background: #3a0000; }
    50% { background: #220000; }
  }

  .game-clock-display.buzzing {
    animation: buzz-flash 0.25s ease-in-out 4;
    color: var(--red);
    text-shadow: var(--glow-red);
  }

  .period-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .period-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    color: #666;
    letter-spacing: 3px;
  }

  .period-display {
    font-size: 34px;
    color: var(--orange);
    text-shadow: var(--glow-orange);
    letter-spacing: 2px;
  }

  /* ===== CLOCK CONTROLS ===== */
  .clock-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }

  /* ===== MAIN SCORE ROW ===== */
  .main-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 12px;
    align-items: center;
    margin-bottom: 14px;
  }

  .team-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  /* ===== POSSESSION ARROW ===== */
  .team-header {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .team-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    color: #888;
    text-transform: uppercase;
  }

  .possession-arrow {
    font-size: 22px;
    color: var(--yellow);
    text-shadow: var(--glow-yellow);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    transform: scale(0.5);
    display: inline-block;
  }

  .possession-arrow.active {
    opacity: 1;
    transform: scale(1);
    animation: arrow-pulse 1.2s ease-in-out infinite alternate;
  }

  @keyframes arrow-pulse {
    from { text-shadow: var(--glow-yellow); }
    to { text-shadow: 0 0 16px #FFD700, 0 0 30px #ffaa00cc; }
  }

  .possession-btn {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 1px;
    background: #1a1400;
    color: #aaa;
    border: 1px solid #333;
    border-radius: 5px;
    cursor: pointer;
    padding: 4px 8px;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .possession-btn:hover { background: #221c00; color: var(--yellow); border-color: #554400; }
  .possession-btn.active { background: #2a1e00; color: var(--yellow); border-color: var(--yellow); box-shadow: var(--glow-yellow); }

  .score-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(52px, 9.5vw, 92px);
    color: var(--orange);
    text-shadow: var(--glow-orange);
    letter-spacing: 2px;
    background: var(--dim-orange);
    padding: 6px 16px;
    border-radius: 8px;
    border: 1px solid #2a1000;
    min-width: 130px;
    text-align: center;
    line-height: 1;
  }

  .score-btns {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* ===== CENTER PANEL ===== */
  .center-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .shot-clock-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    color: #666;
    letter-spacing: 3px;
  }

  .shot-clock-display {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(34px, 5.5vw, 54px);
    color: var(--red);
    text-shadow: var(--glow-red);
    letter-spacing: 2px;
    background: var(--dim-red);
    padding: 4px 14px;
    border-radius: 6px;
    border: 1px solid #2a0000;
    min-width: 86px;
    text-align: center;
    transition: background 0.2s;
  }

  .shot-clock-display.warning {
    animation: blink 0.3s ease-in-out infinite alternate;
  }

  @keyframes shot-buzz {
    0%,100% { background: var(--dim-red); }
    50% { background: #4a0000; }
  }

  .shot-clock-display.buzzing {
    animation: shot-buzz 0.2s ease-in-out 5;
    color: #FF6666;
  }

  /* ===== FOULS ROW ===== */
  .fouls-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }

  .foul-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex: 1;
  }

  .foul-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    color: #666;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .foul-dots {
    display: flex;
    gap: 7px;
    align-items: center;
  }

  .foul-dot {
    width: 19px;
    height: 19px;
    border-radius: 50%;
    border: 2px solid #333;
    background: #1a1a1a;
    transition: all 0.2s;
    cursor: pointer;
  }

  .foul-dot.active:nth-child(1),
  .foul-dot.active:nth-child(2),
  .foul-dot.active:nth-child(3),
  .foul-dot.active:nth-child(4) {
    background: var(--blue);
    border-color: var(--blue);
    box-shadow: var(--glow-blue);
  }

  .foul-dot.active:nth-child(5) {
    background: var(--red);
    border-color: var(--red);
    box-shadow: var(--glow-red);
  }

  .foul-count {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: var(--blue);
    text-shadow: var(--glow-blue);
  }

  .foul-count.maxed { color: var(--red); text-shadow: var(--glow-red); }

  .foul-btns { display: flex; gap: 6px; }

  /* ===== BUTTONS ===== */
  .btn {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    padding: 8px 14px;
    transition: all 0.1s;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  .btn:active { transform: scale(0.93); }

  .btn-start {
    background: #003a00;
    color: var(--green);
    border: 1px solid #005500;
    font-size: 14px;
    padding: 9px 20px;
  }
  .btn-start:hover { background: #004d00; }
  .btn-start.running { background: #3a0000; color: #ff4444; border-color: #550000; }

  .btn-reset {
    background: #1a1000;
    color: var(--orange);
    border: 1px solid #332000;
  }
  .btn-reset:hover { background: #221500; }

  .btn-danger {
    background: #1a0008;
    color: #ff4488;
    border: 1px solid #330015;
    font-size: 11px;
    padding: 5px 10px;
  }
  .btn-danger:hover { background: #220010; }

  .btn-plus {
    background: #001a2a;
    color: var(--blue);
    border: 1px solid #003355;
    font-size: 16px;
    padding: 6px 12px;
  }
  .btn-plus:hover { background: #002235; }

  .btn-minus {
    background: #1a0000;
    color: var(--red);
    border: 1px solid #330000;
    font-size: 16px;
    padding: 6px 12px;
  }
  .btn-minus:hover { background: #220000; }

  .btn-small { font-size: 11px; padding: 5px 9px; }

  .btn-preset {
    background: #1a1a1a;
    color: #aaa;
    border: 1px solid #333;
    font-size: 11px;
    padding: 6px 10px;
  }
  .btn-preset:hover { background: #222; color: var(--white); }
  .btn-preset.active { background: #1a1200; color: var(--orange); border-color: #443300; }

  .btn-shot-start {
    background: #2a0000;
    color: var(--red);
    border: 1px solid #440000;
    font-size: 14px;
    padding: 8px 14px;
  }
  .btn-shot-start:hover { background: #330000; }
  .btn-shot-start.running { background: #001a00; color: var(--green); border-color: #003300; }

  .divider {
    width: 2px;
    height: 50px;
    background: linear-gradient(180deg, transparent, #333, transparent);
  }

  .h-line {
    height: 1px;
    background: linear-gradient(90deg, transparent, #2a2a2a, transparent);
    margin: 10px 0;
  }

  .time-input-group { display: flex; align-items: center; gap: 5px; }
  .time-input {
    background: #111;
    border: 1px solid #333;
    color: var(--white);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    padding: 5px 6px;
    border-radius: 5px;
    width: 48px;
    text-align: center;
  }
  .time-input:focus { outline: none; border-color: #555; }
  .sep { color: #555; font-size: 12px; }

  /* ===== PWA INSTALL BANNER ===== */
  #install-banner {
    display: none;
    background: #111;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 10px 16px;
    margin-bottom: 12px;
    width: min(920px, 100%);
    text-align: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    color: #aaa;
    letter-spacing: 1px;
  }

  #install-banner.visible { display: block; }

  /* iOS install instructions */
  #ios-hint {
    display: none;
    background: #0d1a0d;
    border: 1px solid #2a3a2a;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 12px;
    width: min(920px, 100%);
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    color: #88aa88;
    letter-spacing: 1px;
    line-height: 1.6;
    text-align: center;
  }
</style>
</head>
<body>

<!-- iOS PWA install hint -->
<div id="ios-hint">
  📱 <strong style="color:var(--green)">ホーム画面に追加する方法</strong><br>
  Safari下部の 共有ボタン（□↑）→「ホーム画面に追加」をタップ
</div>

<!-- Android/Desktop install button -->
<div id="install-banner">
  📲 <strong style="color:var(--green)">アプリとしてインストール</strong>できます &nbsp;
  <button class="btn btn-preset" id="install-btn" onclick="installPWA()">インストール</button>
  <button class="btn btn-small" style="background:#111;color:#555;border:1px solid #222;margin-left:4px" onclick="document.getElementById('install-banner').classList.remove('visible')">✕</button>
</div>

<div class="board">

  <!-- ===== GAME CLOCK ===== -->
  <div class="top-row">
    <div class="period-box">
      <div class="period-label">Period</div>
      <div class="period-display" id="periodDisplay">1</div>
      <div style="display:flex;gap:4px;margin-top:4px">
        <button class="btn btn-minus btn-small" onclick="changePeriod(-1)">−</button>
        <button class="btn btn-plus btn-small" onclick="changePeriod(1)">+</button>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div class="game-clock-display" id="gameClock">10:00</div>
    </div>

    <div style="width:72px"></div>
  </div>

  <!-- CLOCK CONTROLS -->
  <div class="clock-controls">
    <div style="display:flex;gap:5px">
      <button class="btn btn-preset active" onclick="setPreset(10)" id="preset10">10min</button>
      <button class="btn btn-preset" onclick="setPreset(12)" id="preset12">12min</button>
      <button class="btn btn-preset" onclick="setPreset(20)" id="preset20">20min</button>
    </div>
    <div class="time-input-group">
      <input type="number" class="time-input" id="customMin" placeholder="mm" min="0" max="99">
      <span class="sep">:</span>
      <input type="number" class="time-input" id="customSec" placeholder="ss" min="0" max="59">
      <button class="btn btn-preset btn-small" onclick="setCustomTime()">SET</button>
    </div>
    <button class="btn btn-start" id="gameStartBtn" onclick="toggleGameClock()">▶ START</button>
    <button class="btn btn-reset" onclick="resetGameClock()">RESET</button>
  </div>

  <div class="h-line"></div>

  <!-- ===== SCORE + SHOT CLOCK ===== -->
  <div class="main-row">

    <!-- HOME TEAM -->
    <div class="team-panel">
      <div class="team-header">
        <span class="possession-arrow" id="arrowH">◀</span>
        <div class="team-label">H O M E</div>
        <button class="possession-btn" id="possBtnH" onclick="setPossession('H')">POSS</button>
      </div>
      <div class="score-display" id="scoreH">000</div>
      <div class="score-btns">
        <button class="btn btn-minus" onclick="changeScore('H',-1)">−1</button>
        <button class="btn btn-plus" onclick="changeScore('H',1)">+1</button>
        <button class="btn btn-plus" onclick="changeScore('H',2)">+2</button>
        <button class="btn btn-plus" onclick="changeScore('H',3)">+3</button>
      </div>
      <button class="btn btn-danger btn-small" onclick="resetScore('H')">SCORE RST</button>
    </div>

    <!-- CENTER: SHOT CLOCK -->
    <div class="center-panel">
      <div class="shot-clock-label">SHOT CLOCK</div>
      <div class="shot-clock-display" id="shotClock">24</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-shot-start" id="shotStartBtn" onclick="toggleShotClock()">▶</button>
        <button class="btn btn-reset" onclick="resetAndStartShot(24)">24</button>
        <button class="btn btn-reset btn-small" onclick="resetAndStartShot(14)">14</button>
      </div>
    </div>

    <!-- GUEST TEAM -->
    <div class="team-panel">
      <div class="team-header">
        <button class="possession-btn" id="possBtnG" onclick="setPossession('G')">POSS</button>
        <div class="team-label">G U E S T</div>
        <span class="possession-arrow" id="arrowG">▶</span>
      </div>
      <div class="score-display" id="scoreG">000</div>
      <div class="score-btns">
        <button class="btn btn-minus" onclick="changeScore('G',-1)">−1</button>
        <button class="btn btn-plus" onclick="changeScore('G',1)">+1</button>
        <button class="btn btn-plus" onclick="changeScore('G',2)">+2</button>
        <button class="btn btn-plus" onclick="changeScore('G',3)">+3</button>
      </div>
      <button class="btn btn-danger btn-small" onclick="resetScore('G')">SCORE RST</button>
    </div>

  </div>

  <div class="h-line"></div>

  <!-- ===== FOULS ===== -->
  <div class="fouls-row">

    <div class="foul-section">
      <div class="foul-label">Home Fouls</div>
      <div class="foul-dots" id="foulsH">
        <div class="foul-dot"></div>
        <div class="foul-dot"></div>
        <div class="foul-dot"></div>
        <div class="foul-dot"></div>
        <div class="foul-dot"></div>
      </div>
      <div class="foul-count" id="foulCountH">0</div>
      <div class="foul-btns">
        <button class="btn btn-minus btn-small" onclick="changeFoul('H',-1)">−</button>
        <button class="btn btn-plus btn-small" onclick="changeFoul('H',1)">+</button>
        <button class="btn btn-reset btn-small" onclick="resetFoul('H')">RST</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="foul-section">
      <div class="foul-label">Guest Fouls</div>
      <div class="foul-dots" id="foulsG">
        <div class="foul-dot"></div>
        <div class="foul-dot"></div>
        <div class="foul-dot"></div>
        <div class="foul-dot"></div>
        <div class="foul-dot"></div>
      </div>
      <div class="foul-count" id="foulCountG">0</div>
      <div class="foul-btns">
        <button class="btn btn-minus btn-small" onclick="changeFoul('G',-1)">−</button>
        <button class="btn btn-plus btn-small" onclick="changeFoul('G',1)">+</button>
        <button class="btn btn-reset btn-small" onclick="resetFoul('G')">RST</button>
      </div>
    </div>

  </div>

</div>

<script>
// ===== AUDIO ENGINE (Web Audio API) =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playBuzzer(type = 'game') {
  try {
    const ctx = getAudioCtx();
    // Game clock buzzer: long harsh buzz
    if (type === 'game') {
      const waves = [
        { freq: 180, dur: 0.0, length: 0.9 },
        { freq: 220, dur: 0.05, length: 0.7 },
        { freq: 160, dur: 0.1, length: 0.9 },
      ];
      waves.forEach(({ freq, dur, length }) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.35, ctx.currentTime + dur);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur + length);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime + dur);
        osc.stop(ctx.currentTime + dur + length);
      });
    } else {
      // Shot clock: 3 short sharp beeps
      [0, 0.22, 0.44].forEach(offset => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'square';
        osc.frequency.value = 880;
        gain.gain.setValueAtTime(0.3, ctx.currentTime + offset);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.15);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime + offset);
        osc.stop(ctx.currentTime + offset + 0.15);
      });
    }
  } catch(e) { console.warn('Audio error:', e); }
}

// Unlock audio on first touch
document.addEventListener('touchstart', () => { try { getAudioCtx(); } catch(e){} }, { once: true });
document.addEventListener('click', () => { try { getAudioCtx(); } catch(e){} }, { once: true });

// ===== STATE =====
let gameTime = 10 * 60 * 1000;
let gameRunning = false;
let gameInterval = null;
let presetMinutes = 10;
let gameBuzzed = false;

let shotTime = 24000;
let shotRunning = false;
let shotInterval = null;
let shotBuzzed = false;

let scores = { H: 0, G: 0 };
let fouls = { H: 0, G: 0 };
let period = 1;
let possession = null; // 'H', 'G', or null

// ===== GAME CLOCK =====
function formatGameTime(ms) {
  if (ms < 0) ms = 0;
  if (ms < 60000) {
    const s = Math.floor(ms / 1000);
    const t = Math.floor((ms % 1000) / 100);
    return `${String(s).padStart(2,'0')}.${t}`;
  }
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function updateGameDisplay() {
  const el = document.getElementById('gameClock');
  el.textContent = formatGameTime(gameTime);
  if (gameTime > 0 && gameTime < 60000) {
    el.classList.add('warning');
    el.classList.remove('buzzing');
  } else if (gameTime <= 0) {
    el.classList.remove('warning');
  } else {
    el.classList.remove('warning');
    el.classList.remove('buzzing');
  }
}

function toggleGameClock() {
  gameRunning ? stopGameClock() : startGameClock();
}

function startGameClock() {
  if (gameTime <= 0) return;
  gameBuzzed = false;
  gameRunning = true;
  document.getElementById('gameStartBtn').textContent = '⏸ PAUSE';
  document.getElementById('gameStartBtn').classList.add('running');
  let last = performance.now();
  gameInterval = setInterval(() => {
    const now = performance.now();
    gameTime -= (now - last);
    last = now;
    if (gameTime <= 0 && !gameBuzzed) {
      gameTime = 0;
      gameBuzzed = true;
      stopGameClock();
      triggerGameBuzzer();
    }
    updateGameDisplay();
  }, 50);
}

function stopGameClock() {
  gameRunning = false;
  clearInterval(gameInterval);
  document.getElementById('gameStartBtn').textContent = '▶ START';
  document.getElementById('gameStartBtn').classList.remove('running');
}

function resetGameClock() {
  stopGameClock();
  gameBuzzed = false;
  gameTime = presetMinutes * 60000;
  const el = document.getElementById('gameClock');
  el.classList.remove('warning','buzzing');
  updateGameDisplay();
}

function setPreset(min) {
  presetMinutes = min;
  document.querySelectorAll('[id^=preset]').forEach(b => b.classList.remove('active'));
  document.getElementById('preset'+min)?.classList.add('active');
  resetGameClock();
}

function setCustomTime() {
  const m = parseInt(document.getElementById('customMin').value) || 0;
  const s = parseInt(document.getElementById('customSec').value) || 0;
  presetMinutes = m + s / 60;
  stopGameClock();
  gameBuzzed = false;
  gameTime = (m * 60 + s) * 1000;
  document.querySelectorAll('[id^=preset]').forEach(b => b.classList.remove('active'));
  updateGameDisplay();
}

function triggerGameBuzzer() {
  playBuzzer('game');
  const el = document.getElementById('gameClock');
  el.classList.remove('warning');
  el.classList.add('buzzing');
  setTimeout(() => { el.classList.remove('buzzing'); }, 1200);
}

// ===== SHOT CLOCK =====
function formatShot(ms) {
  if (ms < 0) ms = 0;
  if (ms < 10000) return (ms / 1000).toFixed(1);
  return String(Math.ceil(ms / 1000));
}

function updateShotDisplay() {
  const el = document.getElementById('shotClock');
  el.textContent = formatShot(shotTime);
  if (shotTime > 0 && shotTime <= 5000) {
    el.classList.add('warning');
    el.classList.remove('buzzing');
  } else if (shotTime <= 0) {
    el.classList.remove('warning');
  } else {
    el.classList.remove('warning','buzzing');
  }
}

function toggleShotClock() {
  shotRunning ? stopShotClock() : startShotClock();
}

function startShotClock() {
  if (shotTime <= 0) return;
  shotBuzzed = false;
  shotRunning = true;
  document.getElementById('shotStartBtn').textContent = '⏸';
  document.getElementById('shotStartBtn').classList.add('running');
  let last = performance.now();
  shotInterval = setInterval(() => {
    const now = performance.now();
    shotTime -= (now - last);
    last = now;
    if (shotTime <= 0 && !shotBuzzed) {
      shotTime = 0;
      shotBuzzed = true;
      stopShotClock();
      triggerShotBuzzer();
    }
    updateShotDisplay();
  }, 50);
}

function stopShotClock() {
  shotRunning = false;
  clearInterval(shotInterval);
  document.getElementById('shotStartBtn').textContent = '▶';
  document.getElementById('shotStartBtn').classList.remove('running');
}

function resetAndStartShot(seconds) {
  stopShotClock();
  shotBuzzed = false;
  shotTime = seconds * 1000;
  const el = document.getElementById('shotClock');
  el.classList.remove('warning','buzzing');
  updateShotDisplay();
  startShotClock(); // auto-start
}

function triggerShotBuzzer() {
  playBuzzer('shot');
  const el = document.getElementById('shotClock');
  el.classList.remove('warning');
  el.classList.add('buzzing');
  setTimeout(() => { el.classList.remove('buzzing'); }, 1000);
}

// ===== SCORES =====
function changeScore(team, delta) {
  scores[team] = Math.max(0, scores[team] + delta);
  document.getElementById('score'+team).textContent = String(scores[team]).padStart(3, '0');
}

function resetScore(team) {
  if (!confirm(`${team === 'H' ? 'HOME' : 'GUEST'}のスコアをリセットしますか？`)) return;
  scores[team] = 0;
  document.getElementById('score'+team).textContent = '000';
}

// ===== POSSESSION =====
function setPossession(team) {
  if (possession === team) {
    possession = null;
  } else {
    possession = team;
  }
  updatePossessionDisplay();
}

function updatePossessionDisplay() {
  const arrowH = document.getElementById('arrowH');
  const arrowG = document.getElementById('arrowG');
  const btnH = document.getElementById('possBtnH');
  const btnG = document.getElementById('possBtnG');

  if (possession === 'H') {
    arrowH.classList.add('active');
    arrowG.classList.remove('active');
    btnH.classList.add('active');
    btnG.classList.remove('active');
  } else if (possession === 'G') {
    arrowH.classList.remove('active');
    arrowG.classList.add('active');
    btnH.classList.remove('active');
    btnG.classList.add('active');
  } else {
    arrowH.classList.remove('active');
    arrowG.classList.remove('active');
    btnH.classList.remove('active');
    btnG.classList.remove('active');
  }
}

// ===== FOULS =====
function changeFoul(team, delta) {
  fouls[team] = Math.max(0, Math.min(5, fouls[team] + delta));
  updateFoulDisplay(team);
}

function resetFoul(team) {
  fouls[team] = 0;
  updateFoulDisplay(team);
}

function updateFoulDisplay(team) {
  const count = fouls[team];
  const dots = document.querySelectorAll(`#fouls${team} .foul-dot`);
  dots.forEach((d, i) => {
    i < count ? d.classList.add('active') : d.classList.remove('active');
  });
  const el = document.getElementById('foulCount'+team);
  el.textContent = count;
  count >= 5 ? el.classList.add('maxed') : el.classList.remove('maxed');
}

document.querySelectorAll('#foulsH .foul-dot').forEach((d, i) => {
  d.addEventListener('click', () => { fouls.H = i + 1 > fouls.H ? i + 1 : i; updateFoulDisplay('H'); });
});
document.querySelectorAll('#foulsG .foul-dot').forEach((d, i) => {
  d.addEventListener('click', () => { fouls.G = i + 1 > fouls.G ? i + 1 : i; updateFoulDisplay('G'); });
});

// ===== PERIOD =====
function changePeriod(delta) {
  period = Math.max(1, Math.min(8, period + delta));
  document.getElementById('periodDisplay').textContent = period;
}

// ===== PWA SETUP =====
// Generate icon as SVG data URI
const iconSVG = `<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0d0d0d"/>
  <rect x="40" y="40" width="432" height="432" rx="60" fill="#1a1a1a" stroke="#333" stroke-width="4"/>
  <!-- Clock digits -->
  <text x="256" y="220" font-family="monospace" font-size="130" font-weight="bold" fill="#F0F0F0" text-anchor="middle" dominant-baseline="middle" filter="url(#glow)">10:00</text>
  <!-- Score -->
  <text x="130" y="360" font-family="monospace" font-size="90" font-weight="bold" fill="#FF8C00" text-anchor="middle" dominant-baseline="middle">102</text>
  <text x="256" y="360" font-family="monospace" font-size="60" font-weight="bold" fill="#FF2020" text-anchor="middle" dominant-baseline="middle">24</text>
  <text x="382" y="360" font-family="monospace" font-size="90" font-weight="bold" fill="#FF8C00" text-anchor="middle" dominant-baseline="middle">99</text>
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
</svg>`;

const iconDataURI = 'data:image/svg+xml,' + encodeURIComponent(iconSVG);
document.getElementById('apple-icon').href = iconDataURI;

// Create manifest blob
const manifest = {
  name: "Basketball Scoreboard",
  short_name: "Basketball",
  description: "Basketball scoreboard with game clock, shot clock, scores and fouls",
  start_url: "./",
  display: "standalone",
  background_color: "#0a0a0a",
  theme_color: "#0a0a0a",
  orientation: "landscape",
  icons: [
    { src: iconDataURI, sizes: "512x512", type: "image/svg+xml", purpose: "any maskable" }
  ]
};

const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
const manifestURL = URL.createObjectURL(manifestBlob);
document.getElementById('manifest-link').href = manifestURL;

// PWA install prompt
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('visible');
});

function installPWA() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-banner').classList.remove('visible');
  });
}

// iOS detection — show hint
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandalone = window.navigator.standalone === true;
if (isIOS && !isInStandalone) {
  document.getElementById('ios-hint').style.display = 'block';
}

// ===== INIT =====
updateGameDisplay();
updateShotDisplay();
</script>
</body>
</html>
